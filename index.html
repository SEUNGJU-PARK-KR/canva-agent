<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="color-scheme" content="light">
  <title>실권주 레이더 불러오는 중</title>
  <style>
    :root { font-family: Pretendard, "Noto Sans KR", system-ui, -apple-system, sans-serif; color: #17212b; background: #f5f8f7; }
    * { box-sizing: border-box; }
    body { margin: 0; min-height: 100vh; display: grid; place-items: center; padding: 24px; }
    main { width: min(560px, 100%); background: #fff; border: 1px solid #e3e8ed; border-radius: 24px; padding: 34px; box-shadow: 0 18px 45px rgba(16,44,39,.09); }
    .mark { width: 52px; height: 52px; display: grid; place-items: center; border-radius: 16px; background: #123b35; color: #fff; font-weight: 800; font-size: 22px; }
    h1 { margin: 22px 0 8px; font-size: 26px; }
    p { margin: 0; color: #65727f; line-height: 1.7; }
    .bar { height: 9px; margin-top: 26px; overflow: hidden; border-radius: 999px; background: #e5f5ee; }
    .bar::after { content: ""; display: block; width: 42%; height: 100%; border-radius: inherit; background: #1f8a66; animation: move 1.15s ease-in-out infinite alternate; }
    .error { margin-top: 20px; padding: 15px; border-radius: 14px; background: #fdeaea; color: #8b2f2f; white-space: pre-wrap; }
    @keyframes move { from { transform: translateX(-15%); } to { transform: translateX(155%); } }
  </style>
</head>
<body>
  <main>
    <div class="mark">R</div>
    <h1>실권주 레이더를 불러오고 있습니다</h1>
    <p>대시보드와 캘린더, 브라우저 설정 저장 기능을 준비하는 중입니다.</p>
    <div class="bar" aria-hidden="true"></div>
    <div id="error" class="error" hidden></div>
  </main>
  <script>
    (async () => {
      const files = Array.from({ length: 9 }, (_, i) => `rights-radar-public/payload/part-${String(i).padStart(2, "0")}.txt`);
      try {
        if (!("DecompressionStream" in window)) {
          throw new Error("이 브라우저는 압축 해제를 지원하지 않습니다. 최신 Chrome, Edge, Firefox 또는 Safari에서 열어 주세요.");
        }
        const chunks = await Promise.all(files.map(async (file) => {
          const response = await fetch(file, { cache: "no-cache" });
          if (!response.ok) throw new Error(`${file}을 불러오지 못했습니다. HTTP ${response.status}`);
          return (await response.text()).trim();
        }));
        const binary = Uint8Array.from(atob(chunks.join("")), (char) => char.charCodeAt(0));
        const stream = new Blob([binary]).stream().pipeThrough(new DecompressionStream("gzip"));
        const html = await new Response(stream).text();

        const patchCode = String.raw`
(() => {
  "use strict";

  const STORAGE_KEY = "rightsRadar.publicApiSecrets.v1";
  const fields = [
    { key: "openDartKey", input: "#open-dart-key", clear: "#clear-open-dart-key", hint: "#dart-key-hint", label: "OpenDART 인증키" },
    { key: "krxAuthKey", input: "#krx-auth-key", clear: "#clear-krx-auth-key", hint: "#krx-key-hint", label: "KRX 인증키" },
    { key: "alertWebhookUrl", input: "#alert-webhook-url", clear: "#clear-alert-webhook-url", hint: "#webhook-hint", label: "웹훅 주소" },
  ];

  function readSecrets() {
    try {
      return JSON.parse(window.localStorage.getItem(STORAGE_KEY) || "{}") || {};
    } catch (_) {
      return {};
    }
  }

  function writeSecrets(next) {
    try {
      window.localStorage.setItem(STORAGE_KEY, JSON.stringify(next));
    } catch (_) {
      // 브라우저 저장소가 막혀 있으면 현재 화면에서만 유지됩니다.
    }
  }

  function saveSecrets() {
    const next = readSecrets();
    fields.forEach((field) => {
      const input = document.querySelector(field.input);
      const clear = document.querySelector(field.clear);
      if (clear?.checked) {
        delete next[field.key];
      } else if (input?.value.trim()) {
        next[field.key] = input.value.trim();
      }
    });
    writeSecrets(next);
    window.setTimeout(restoreSecrets, 30);
    window.setTimeout(restoreSecrets, 350);
    window.setTimeout(restoreSecrets, 1100);
  }

  function restoreSecrets() {
    const saved = readSecrets();
    fields.forEach((field) => {
      const input = document.querySelector(field.input);
      const clear = document.querySelector(field.clear);
      const hint = document.querySelector(field.hint);
      const value = saved[field.key] || "";
      if (input && value && !clear?.checked && !input.value) input.value = value;
      if (hint && value) hint.textContent = field.label + "는 이 브라우저의 로컬 저장소에 보관되어 있습니다.";
    });

    const message = document.querySelector("#settings-message span:last-child");
    if (message?.textContent.includes("비밀값 원문을 저장하지 않고")) {
      message.textContent = "공개 버전에서는 입력값을 이 브라우저의 로컬 저장소에 보관합니다.";
    }

    const form = document.querySelector(".settings-form");
    if (form && !document.querySelector("#public-storage-note")) {
      const note = document.createElement("p");
      note.id = "public-storage-note";
      note.className = "settings-note settings-note--secure";
      note.textContent = "공개 정적 버전입니다. API 입력값은 서버가 아니라 이 브라우저의 localStorage에 저장됩니다. 공용 PC에서는 저장하지 마세요.";
      form.prepend(note);
    }
  }

  document.addEventListener("DOMContentLoaded", () => {
    restoreSecrets();

    document.addEventListener("click", (event) => {
      if (event.target.closest("#settings-save-button")) saveSecrets();
      if (event.target.closest('[data-view-tab="settings"], a[href="#settings"]')) {
        window.setTimeout(restoreSecrets, 50);
        window.setTimeout(restoreSecrets, 500);
      }
    }, true);

    document.addEventListener("submit", (event) => {
      if (event.target.matches(".settings-form")) saveSecrets();
    }, true);

    const observer = new MutationObserver(() => restoreSecrets());
    observer.observe(document.body, { subtree: true, attributes: true, attributeFilter: ["hidden", "class"] });
  });
})();`;
        const patch = "<script>" + patchCode + "</scr" + "ipt>";
        const patchedHtml = html.includes("</body>") ? html.replace("</body>", patch + "</body>") : html + patch;
        document.open();
        document.write(patchedHtml);
        document.close();
      } catch (error) {
        const box = document.getElementById("error");
        box.hidden = false;
        box.textContent = `사이트를 불러오지 못했습니다.\n${error.message}`;
      }
    })();
  </script>
</body>
</html>
